<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#ffffff">
  <title>おうち当番</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <!-- ログイン画面 -->
  <div id="login-screen" class="login-screen">
    <div class="login-container">
      <div class="login-icon">
        <svg viewBox="0 0 512 512" width="80" height="80">
          <defs><linearGradient id="lbg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#FFB5C5"/><stop offset="100%" stop-color="#FFDAB9"/></linearGradient></defs>
          <rect width="512" height="512" rx="96" fill="url(#lbg)"/>
          <g transform="translate(256,270)">
            <path d="M-120,20 L-120,-60 L0,-140 L120,-60 L120,20 L60,20 L60,-20 L20,-20 L20,20 Z" fill="white" stroke="#E8828A" stroke-width="8" stroke-linejoin="round"/>
            <rect x="-40" y="-50" width="35" height="30" rx="4" fill="#FFE4B5" stroke="#E8828A" stroke-width="4"/>
            <rect x="15" y="-50" width="35" height="30" rx="4" fill="#FFE4B5" stroke="#E8828A" stroke-width="4"/>
            <rect x="-20" y="-10" width="40" height="32" rx="6" fill="#E8828A"/>
            <circle cx="8" cy="6" r="4" fill="#FFB5C5"/>
            <path d="M80,-80 L80,-110" stroke="#E8828A" stroke-width="8" stroke-linecap="round"/>
            <path d="M80,-115 C80,-130 65,-138 58,-125 C51,-138 36,-130 36,-115 C36,-100 58,-88 58,-88 C58,-88 80,-100 80,-115Z" fill="#FF8FA3" opacity="0.8"/>
          </g>
        </svg>
      </div>
      <h2>おうち当番</h2>
      <p class="login-subtitle">家族の家事管理アプリ</p>
      <div id="login-form"></div>
    </div>
  </div>

  <header class="app-header">
    <h1>おうち当番</h1>
  </header>

  <main id="main">
    <!-- Tab 1: 今日 -->
    <section id="tab-today" class="tab-panel active">
      <div id="today-content"></div>
    </section>

    <!-- Tab 2: ゴミカレンダー -->
    <section id="tab-calendar" class="tab-panel">
      <div id="calendar-content"></div>
    </section>

    <!-- Tab 3: ポイント・履歴 -->
    <section id="tab-points" class="tab-panel">
      <div id="points-content"></div>
    </section>

    <!-- Tab 4: 設定 -->
    <section id="tab-settings" class="tab-panel">
      <div id="settings-content"></div>
    </section>

    <!-- Tab 5: AI相談 -->
    <section id="tab-chat" class="tab-panel">
      <div id="chat-content"></div>
    </section>
  </main>

  <nav class="bottom-nav">
    <button class="nav-btn active" data-tab="today">
      <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="4"/><path d="M12 2v2m0 16v2M4.93 4.93l1.41 1.41m11.32 11.32l1.41 1.41M2 12h2m16 0h2M4.93 19.07l1.41-1.41m11.32-11.32l1.41-1.41"/>
      </svg>
      <span>今日</span>
    </button>
    <button class="nav-btn" data-tab="calendar">
      <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/>
      </svg>
      <span>ゴミ暦</span>
    </button>
    <button class="nav-btn" data-tab="points">
      <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 20V10m6 10V4M6 20v-6"/>
      </svg>
      <span>ポイント</span>
    </button>
    <button class="nav-btn" data-tab="settings">
      <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
      </svg>
      <span>設定</span>
    </button>
    <button class="nav-btn" data-tab="chat">
      <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
      </svg>
      <span>AI相談</span>
    </button>
  </nav>

  <!-- ステータス選択モーダル -->
  <div id="status-modal" class="modal hidden">
    <div class="modal-backdrop" data-action="close-modal"></div>
    <div class="modal-sheet">
      <h3>ステータスを選択</h3>
      <button class="status-option done" data-action="set-status" data-status="done">&#10003; やった</button>
      <button class="status-option not-done" data-action="set-status" data-status="not_done">&#10007; やらなかった</button>
      <button class="status-option carry-over" data-action="set-status" data-status="carry_over">&#8594; 明日に持ち越し</button>
      <button class="status-option other" data-action="set-status" data-status="other">&#8230; その他</button>
    </div>
  </div>

  <!-- ルーレットモーダル -->
  <div id="roulette-modal" class="modal hidden">
    <div class="modal-backdrop" data-action="close-roulette"></div>
    <div class="modal-sheet roulette-sheet">
      <h3>ルーレット</h3>
      <div id="roulette-container"></div>
    </div>
  </div>

  <!-- 更新履歴モーダル -->
  <div id="changelog-modal" class="modal hidden">
    <div class="modal-backdrop" data-action="close-changelog"></div>
    <div class="modal-sheet">
      <h3>更新履歴</h3>
      <div id="changelog-content"></div>
      <button class="btn btn-secondary btn-block" data-action="close-changelog" style="margin-top:12px;">閉じる</button>
    </div>
  </div>

  <p class="ios-note">※ iOSではプッシュ通知が届かない場合があります</p>

  <script src="./app.js"></script>
</body>
</html>
